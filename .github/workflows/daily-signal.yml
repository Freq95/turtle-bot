name: Daily BTC Signal Check (D-Alt-Med)

# Runs every day at 00:30 UTC (30 minutes after daily bar close).
# Also triggerable manually from GitHub UI for testing.
on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

# Allow workflow to commit updated state.json back to repo.
permissions:
  contents: write

# Force Node.js 24 for actions (Node 20 deprecation deadline: Sept 16, 2026).
# Once actions/checkout v5 + setup-python v6 are stable, this can be removed.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal check (with Telegram alert)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # --always-send: send daily status message even if no signal fires.
        # Remove --always-send after verification week to get only signal-day alerts.
        run: python check_signal.py --telegram --always-send

      - name: Commit state.json changes if any
        # Auto-commits state.json updates back to repo. Also serves as
        # "keep-alive": daily commits prevent the 60-day inactivity pause.
        run: |
          git config user.name "turtle-bot"
          git config user.email "bot@noreply.local"
          git add state.json
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "bot: state update $(date -u +%Y-%m-%d)"
            git push
          fi
