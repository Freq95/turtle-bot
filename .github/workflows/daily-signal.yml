name: Daily BTC Signal Check (D-Alt-Med)

# Runs every day at 00:30 UTC (30 minutes after daily bar close).
# Also can be triggered manually from GitHub UI for testing.
on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  check-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal check (with Telegram alert)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # SIGNAL_EXCHANGE: kraken    # Default. Override to 'coinbase', 'bitstamp', 'okx' if needed.
          # SIGNAL_SYMBOL: BTC/USDT    # Default.
        # --always-send: send daily status message even if no signal fires.
        # Remove --always-send after 1 week of verification to get only signal-day alerts.
        run: python check_signal.py --telegram --always-send
