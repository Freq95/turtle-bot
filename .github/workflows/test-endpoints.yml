name: Test Binance Endpoints (one-off probe)

# Manual-only. Run from the Actions tab ("Run workflow") to discover which
# Binance data hosts the US GitHub runner can actually reach.
#   HTTP 200 = reachable    HTTP 451 = geo-blocked (Unavailable For Legal Reasons)
# Delete this file once we've picked the data source.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Probe Binance data endpoints from the US runner
        run: |
          set -u
          echo "Runner public IP: $(curl -s --max-time 10 https://api.ipify.org)"
          echo

          probe () {
            name="$1"; url="$2"
            echo "=== $name ==="
            echo "$url"
            code=$(curl -s -o /tmp/body.txt -w "%{http_code}" --max-time 20 "$url" || echo "000")
            echo "HTTP $code"
            echo "Body (first 200 chars): $(head -c 200 /tmp/body.txt)"
            echo
          }

          probe "1. api.binance.com (global Binance)" \
                "https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=3"
          probe "2. data-api.binance.vision (global mirror, no key)" \
                "https://data-api.binance.vision/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=3"
          probe "3. api.binance.us (Binance.US exchange)" \
                "https://api.binance.us/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=3"

          # 4. Static archive (global Binance, published next day). Use yesterday's file.
          YDAY=$(date -u -d 'yesterday' +%Y-%m-%d)
          ARCH="https://data.binance.vision/data/spot/daily/klines/BTCUSDT/1d/BTCUSDT-1d-${YDAY}.zip"
          echo "=== 4. data.binance.vision archive (global, static CSV) ==="
          echo "$ARCH"
          code=$(curl -s -o /tmp/arch.zip -w "%{http_code}" --max-time 20 "$ARCH" || echo "000")
          echo "HTTP $code"
          if [ "$code" = "200" ]; then
            echo "Downloaded $(wc -c < /tmp/arch.zip) bytes; CSV first line:"
            unzip -p /tmp/arch.zip | head -n 1
          fi
          echo

          echo "Legend: 200 = reachable, 451 = geo-blocked, 000 = timeout/DNS."
